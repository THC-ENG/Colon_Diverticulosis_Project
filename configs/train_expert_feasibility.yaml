# Expert feasibility config (single-stage only)

# Data
dataset_root: data/expert_dataset
train_image_dir: data/expert_dataset/images/train
train_mask_dir: data/expert_dataset/masks/train
val_image_dir: data/expert_dataset/images/val
val_mask_dir: data/expert_dataset/masks/val
all_image_dir: ""
all_mask_dir: ""
split_json: ""
fold_index: 0

# Training
epochs: 100
batch_size: 4
lr: 0.0001
encoder_lr_mult: 0.1
weight_decay: 0.0001
warmup_epochs: 5
grad_clip_norm: 1.0
num_workers: 2
img_size: 256
seed: 42
save_path: checkpoints/expert_feasibility_baseline.pth
init_checkpoint: ""
run_name: expert_feasibility_baseline

# Runtime
device: cuda
amp: true
norm_type: gn

# Model architecture
window_size: 8
use_shift_mask: true
use_rel_pos_bias: true
pad_to_window: true
deep_supervision: true
ds_weight_d2: 0.4
ds_weight_d3: 0.2
ds_weight_d4: 0.1

# Toggle: baseline first
use_boundary: false

# Segmentation loss weights
seg_focal_weight: 0.7
seg_dice_weight: 0.3

# Boundary branch params (effective only when use_boundary=true)
boundary_weight: 0.3
boundary_bce_weight: 1.0
boundary_dice_weight: 0.0
boundary_radius: 1
boundary_warmup_ratio: 0.3

# Focal parameters
focal_alpha: 0.25
focal_gamma: 2.0
